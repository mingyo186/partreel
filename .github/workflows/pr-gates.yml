name: PR quality gates (contributions)

# 외부 기여(봇/사람 PR)도 동일한 품질 게이트로 자동 심사 (REQUIREMENTS §17/§14).
# 게이트 green = 등록 자격. 머지는 메인테이너(또는 추후 자동머지).
on:
  pull_request:

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 기여자(봇)는 원천 5파일만 제출 — 파생물은 여기서 빌드 후 검사 (§20)
      - name: Build derived artifacts
        run: |
          python3 generators/build_index.py
          python3 generators/render_svg.py
          python3 generators/build_site.py
          python3 generators/build_api.py

      - name: Structure / overlap / render / meta / zfight gates
        run: |
          pip -q install trimesh numpy scipy
          python3 generators/validate_kicad.py
          python3 generators/check_overlap.py
          python3 generators/check_render.py
          python3 generators/check_zfight.py

      - name: Install FreeCAD (conda-forge) for STEP kernel check
        run: |
          curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest | tar -xj bin/micromamba
          ./bin/micromamba create -y -q -p ./fcenv -c conda-forge freecad python=3.11 > /dev/null

      - name: STEP kernel gate (isValid / volume)
        run: ./fcenv/bin/freecadcmd generators/validate_step.py
