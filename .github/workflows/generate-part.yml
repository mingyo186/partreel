name: Generate part on demand

on:
  repository_dispatch:
    types: [generate-part]

permissions:
  contents: write
  pages: write
  id-token: write

# deploy.yml과 같은 그룹으로 직렬화 — Pages 배포 레이스 방지 (52/53 경합 사건)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      - name: Validate request
        id: req
        run: |
          FAMILY="${{ github.event.client_payload.family }}"
          PINS="${{ github.event.client_payload.pins }}"
          VARIANT="${{ github.event.client_payload.variant }}"
          if ! echo "$FAMILY" | grep -qE '^[a-z0-9_]{1,40}$'; then echo "bad family"; exit 1; fi
          if [ -n "$PINS" ] && ! echo "$PINS" | grep -qE '^[0-9]{1,2}$'; then echo "bad pins"; exit 1; fi
          if [ -n "$VARIANT" ] && ! echo "$VARIANT" | grep -qE '^[a-z0-9]{1,12}$'; then echo "bad variant"; exit 1; fi
          if [ -z "$PINS" ] && [ -z "$VARIANT" ]; then echo "need pins or variant"; exit 1; fi
          echo "family=$FAMILY" >> "$GITHUB_OUTPUT"
          echo "pins=$PINS" >> "$GITHUB_OUTPUT"
          echo "variant=$VARIANT" >> "$GITHUB_OUTPUT"

      # R2 크리덴셜 없으면 새 부품 3D를 창고(assets.partreel.com)에 못 올림 → 조기 명시 실패 (§19 사건 2026-07-24)
      - name: Require R2 credential
        env:
          T: ${{ secrets.R2_WRANGLER_TOKEN }}
        run: |
          if [ -z "$T" ]; then
            echo "::error::R2_WRANGLER_TOKEN secret missing - on-demand 3D cannot be published (see REQUIREMENTS §19)"
            exit 1
          fi

      # ubuntu 24.04 apt엔 freecad가 없음 → conda-forge로 설치 (REQUIREMENTS §19)
      - name: Install FreeCAD + deps (conda-forge)
        run: |
          curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest | tar -xj bin/micromamba
          ./bin/micromamba create -y -q -p ./fcenv -c conda-forge freecad python=3.11 trimesh numpy scipy > /dev/null
          ./fcenv/bin/freecadcmd --version

      - name: Generate part (gated)
        env:
          FAMILY: ${{ steps.req.outputs.family }}
          PINS: ${{ steps.req.outputs.pins }}
          VARIANT: ${{ steps.req.outputs.variant }}
          FREECADCMD: ./fcenv/bin/freecadcmd
          # R2 업로드는 generate_one 내부, qa(check_r2) 이전에 수행 (§19/§22)
          CLOUDFLARE_API_TOKEN: ${{ secrets.R2_WRANGLER_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 59c582799b858f66a23af4561c26c696
        run: ./fcenv/bin/python generators/generate_one.py

      - name: Commit to main
        run: |
          git config user.name "partreel-bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet && echo "nothing new" || git commit -m "On-demand part: ${{ steps.req.outputs.family }}_${{ steps.req.outputs.pins }}pin (requested via MCP)"
          git pull --rebase origin main
          git push origin main

      # GITHUB_TOKEN 푸시는 deploy.yml을 트리거하지 않으므로 여기서 인라인 배포 (REQUIREMENTS §19)
      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html index.json _site/
          cp -r assets library p about guide agents api browse _site/
          # 대용량 3D(step/glb)는 R2가 서빙 (§22) — deploy.yml과 동일하게 제거
          find _site/library -name "*.step" -delete
          find _site/library -name "*.glb" -delete
          cp sitemap.xml robots.txt favicon.svg llms.txt _site/
          echo "partreel.com" > _site/CNAME

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4

      # 배포 성공 보고 != 실제 반영 (2026-07-04 ht7330 사건: 인라인 배포 성공 보고 후 구버전
      # 서빙 + Pages 간헐 오류). 라이브 검증 실패 시 런을 빨갛게.
      - name: Verify live
        run: |
          PART_ID=""
          V="${{ steps.req.outputs.variant }}"
          F="${{ steps.req.outputs.family }}"
          if [ -n "$V" ]; then
            case "$F" in
              ht73xx|ht78xx) PART_ID="ht$V";;
              sy8008) [ "$V" = "b" ] && PART_ID="sy8008" || PART_ID="sy8008$V";;
              max1704x) PART_ID="max$V";;
              *) PART_ID="${F}_${V}";;
            esac
          else
            PART_ID="${F}_${{ steps.req.outputs.pins }}pin"
          fi
          echo "verifying https://partreel.com/api/v1/parts/$PART_ID.json"
          for i in $(seq 1 18); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://partreel.com/api/v1/parts/$PART_ID.json?cb=$i$RANDOM")
            [ "$code" = "200" ] && echo "live OK" && exit 0
            sleep 10
          done
          echo "part not live after 3min - Pages deploy likely flaked; re-run deploy.yml"
          exit 1
