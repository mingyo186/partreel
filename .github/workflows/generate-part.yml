name: Generate part on demand

on:
  repository_dispatch:
    types: [generate-part]

permissions:
  contents: write
  pages: write
  id-token: write

# deploy.yml과 같은 그룹으로 직렬화 — Pages 배포 레이스 방지 (52/53 경합 사건)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      - name: Validate request
        id: req
        run: |
          FAMILY="${{ github.event.client_payload.family }}"
          PINS="${{ github.event.client_payload.pins }}"
          VARIANT="${{ github.event.client_payload.variant }}"
          if ! echo "$FAMILY" | grep -qE '^[a-z0-9_]{1,40}$'; then echo "bad family"; exit 1; fi
          if [ -n "$PINS" ] && ! echo "$PINS" | grep -qE '^[0-9]{1,2}$'; then echo "bad pins"; exit 1; fi
          if [ -n "$VARIANT" ] && ! echo "$VARIANT" | grep -qE '^[a-z0-9]{1,12}$'; then echo "bad variant"; exit 1; fi
          if [ -z "$PINS" ] && [ -z "$VARIANT" ]; then echo "need pins or variant"; exit 1; fi
          echo "family=$FAMILY" >> "$GITHUB_OUTPUT"
          echo "pins=$PINS" >> "$GITHUB_OUTPUT"
          echo "variant=$VARIANT" >> "$GITHUB_OUTPUT"

      # ubuntu 24.04 apt엔 freecad가 없음 → conda-forge로 설치 (REQUIREMENTS §19)
      - name: Install FreeCAD + deps (conda-forge)
        run: |
          curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest | tar -xj bin/micromamba
          ./bin/micromamba create -y -q -p ./fcenv -c conda-forge freecad python=3.11 trimesh numpy scipy > /dev/null
          ./fcenv/bin/freecadcmd --version

      - name: Generate part (gated)
        env:
          FAMILY: ${{ steps.req.outputs.family }}
          PINS: ${{ steps.req.outputs.pins }}
          VARIANT: ${{ steps.req.outputs.variant }}
          FREECADCMD: ./fcenv/bin/freecadcmd
        run: ./fcenv/bin/python generators/generate_one.py

      - name: Commit to main
        run: |
          git config user.name "partreel-bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet && echo "nothing new" || git commit -m "On-demand part: ${{ steps.req.outputs.family }}_${{ steps.req.outputs.pins }}pin (requested via MCP)"
          git pull --rebase origin main
          git push origin main

      # GITHUB_TOKEN 푸시는 deploy.yml을 트리거하지 않으므로 여기서 인라인 배포 (REQUIREMENTS §19)
      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html index.json _site/
          cp -r assets library p about guide agents api _site/
          cp sitemap.xml robots.txt favicon.svg llms.txt _site/
          echo "partreel.com" > _site/CNAME

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
