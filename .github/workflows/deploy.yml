name: Deploy PartReel to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # 교차검증 게이트: KiCad 파일 구조가 깨졌으면 배포 중단 (REQUIREMENTS §5-1)
      - name: Validate KiCad files
        run: python3 generators/validate_kicad.py

      - name: Check SVG text overlaps
        run: python3 generators/check_overlap.py

      # publish 정리: 사이트+라이브러리만 공개. generators/docs는 제외.
      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp index.json _site/
          cp -r assets _site/
          cp -r library _site/
          cp -r p _site/
          cp -r about guide _site/
          cp sitemap.xml robots.txt favicon.svg _site/
          echo "partreel.com" > _site/CNAME

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
