name: Deploy PartReel to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # 파생물 자동 빌드 (§20): 기여자는 원천 5파일만 내면 됨. index/svg/pages/api는 CI가 생성.
      # field_reports 집계도 이때 API에 반영 (GITHUB_TOKEN으로 이슈 조회).
      - name: Build derived artifacts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 generators/build_index.py
          python3 generators/render_svg.py
          python3 generators/build_site.py
          python3 generators/build_api.py

      # 교차검증 게이트: KiCad 파일 구조가 깨졌으면 배포 중단 (REQUIREMENTS §5-1)
      - name: Validate KiCad files
        run: python3 generators/validate_kicad.py

      - name: Check SVG text overlaps
        run: python3 generators/check_overlap.py

      - name: Check render completeness
        run: python3 generators/check_render.py

      - name: Check coplanar z-fighting in 3D
        run: |
          pip -q install trimesh numpy scipy
          python3 generators/check_zfight.py

      # publish 정리: 사이트+라이브러리만 공개. generators/docs는 제외.
      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp index.json _site/
          cp -r assets _site/
          cp -r library _site/
          # 대용량 3D(step/glb)는 R2(assets.partreel.com)가 서빙 (§22) — Pages 예산 절약
          find _site/library -name "*.step" -delete
          find _site/library -name "*.glb" -delete
          cp -r p _site/
          cp -r about guide agents api browse _site/
          cp sitemap.xml robots.txt favicon.svg llms.txt _site/
          echo "partreel.com" > _site/CNAME

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
